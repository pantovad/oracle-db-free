apiVersion: v1
kind: Secret
metadata:
  name: {{ template "fullname" . }}
{{- include "oracle-db-labels" . | indent 2 }}
stringData:
  oracle_password: {{ default (randAlphaNum 10) .Values.oracle_password | quote }}
  app_user: {{ .Values.app_user | quote }}
  app_user_password: {{ default (randAlphaNum 10) .Values.app_user_password | quote }}
